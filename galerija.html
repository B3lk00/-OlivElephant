<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OlivElephant | Galerija</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>

  <header>
    <div class="header-container">
    <div class="logo">
    <img src="images/logo.png" alt="OlivElephant logo">
    <span>OlivElephant</span>
    </div>

<button class="menu-toggle" id="menu-toggle" aria-label="Otvori meni">
  <span></span>
  <span></span>
  <span></span>
</button>
      
      <nav id="nav-menu">
        <a href="index.html">Početna</a>
        <a href="cjenovnik.html">Cjenovnik</a>
        <a href="oprema.html">Oprema i Sigurnost</a>
        <a href="galerija.html" class="active">Galerija</a>
        <a href="kontakt.html">Kontakt</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <h2>Galerija</h2>
      <p>
        Pogledajte dio atmosfere, prostora i aktivnosti kluba OlivElephant.
      </p>
    </section>

    <section>
      <h2>Fotografije</h2>
      <div class="real-gallery">
        <div class="gallery-item">
        <img src="images/galerija1.jpg" onclick="openLightbox(0)">
        </div>

        <div class="gallery-item">
          <img src="images/galerija2.jpg" onclick="openLightbox(1)">
        </div>

        <div class="gallery-item">
          <img src="images/galerija3.jpg" onclick="openLightbox(1)">
        </div>

        <div class="gallery-item">
          <img src="images/galerija4.jpg" onclick="openLightbox(1)">
        </div>

          <div class="gallery-item">
          <img src="images/galerija5.jpg" onclick="openLightbox(1)">
        </div>
        
      </div>
    </section>

    <div id="lightbox">
  <span class="close" onclick="closeLightbox()">✖</span>

  <img id="lightbox-img">

  <button class="prev" onclick="changeSlide(-1)">❮</button>
  <button class="next" onclick="changeSlide(1)">❯</button>
</div>


  <footer>
    <p>&copy; 2026 OlivElephant. Sva prava zadržana.</p>
  </footer>

<script>
  const toggle = document.getElementById("menu-toggle");
  const menu = document.getElementById("nav-menu");
  const links = document.querySelectorAll("#nav-menu a");

  if (toggle && menu) {
    toggle.addEventListener("click", function () {
      menu.classList.toggle("show");
      toggle.classList.toggle("active");
    });

    links.forEach(function (link) {
      link.addEventListener("click", function () {
        menu.classList.remove("show");
        toggle.classList.remove("active");
      });
    });
  }
</script>


  

<script>
  const galleryImages = document.querySelectorAll(".gallery-item img");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  let currentIndex = 0;

  galleryImages.forEach((img, index) => {
    img.addEventListener("click", () => {
      currentIndex = index;
      lightbox.style.display = "flex";
      lightboxImg.src = img.src;
    });
  });

  function closeLightbox() {
    lightbox.style.display = "none";
  }

  function changeSlide(direction) {
    currentIndex += direction;

    if (currentIndex < 0) currentIndex = galleryImages.length - 1;
    if (currentIndex >= galleryImages.length) currentIndex = 0;

    lightboxImg.src = galleryImages[currentIndex].src;
  }
</script>
  
  
</body>
</html>
